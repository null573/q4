<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>销售排队系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v=34">
</head>
<body>
    <div id="authOverlay" class="auth-overlay" style="display:none;">
        <div class="auth-box">
            <div class="auth-icon">🔒</div>
            <h2>需要授权访问</h2>
            <p>本系统仅限授权用户使用</p>
            <div class="auth-form">
                <select id="authUserSelect">
                    <option value="">请选择员工</option>
                </select>
                <input type="password" id="authPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doAuth()">
                <button onclick="doAuth()">登 录</button>
            </div>
            <p class="auth-error" id="authError"></p>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <h1>销售排队系统</h1>
            <div class="user-info">
                <span id="userName">未登录</span>
                <button id="changePwdBtn" class="btn-change-pwd" onclick="openChangePwdModal()" style="display:none;">修改密码</button>
                <button id="logoutBtn" class="btn-logout" onclick="doLogout()" style="display:none;">退出</button>
            </div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('create', event)">订单排队</button>
            <button class="tab-btn" onclick="showTab('list', event)">排队明细</button>
            <button class="tab-btn" onclick="showTab('feedback', event)">问题反馈</button>
            <button class="tab-btn admin-only" id="adminTabBtn" onclick="showTab('admin', event)" style="display:none;">管理员</button>
        </nav>

        <div id="adminAlertBar" class="admin-alert-bar" style="display:none;"></div>

        <div id="createTab" class="tab-content active">
            <form id="orderForm" class="order-form" autocomplete="off">
                <div class="form-row">
                    <div class="form-group form-col">
                        <label for="model">型号 <span class="required">*</span></label>
                        <select id="model" name="model" required autocomplete="off">
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group form-col">
                        <label for="tonnage">吨位 <span class="required">*</span></label>
                        <input type="number" id="tonnage" name="tonnage" step="0.01" required placeholder="吨位" autocomplete="off">
                    </div>
                    <div class="form-group form-col">
                        <label for="customer">客户 <span class="required">*</span></label>
                        <input type="text" id="customer" name="customer" required placeholder="客户" autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="expectedDate">期望发货日期 <span class="required">*</span></label>
                    <input type="text" id="expectedDate" name="expectedDate" required readonly placeholder="点击选择日期" onclick="showDatePicker(this)" style="cursor:pointer;background:#fff;">
                </div>

                <div class="form-group">
                    <label for="calculatedDate">可发货日期</label>
                    <input type="text" id="calculatedDate" name="calculatedDate" readonly placeholder="填写上方信息后自动计算">
                </div>

                <div class="form-group">
                    <label for="queueDate">输入发货日期排队 <span class="required">*</span></label>
                    <input type="text" id="queueDate" name="queueDate" required readonly placeholder="点击选择日期" onclick="showDatePicker(this)" style="cursor:pointer;background:#fff;">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">提交排队</button>
                    <button type="reset" class="btn-reset">重置</button>
                </div>
            </form>
        </div>

        <div id="listTab" class="tab-content">
            <div class="filter-bar">
                <div id="adminFilter" class="admin-filter"></div>
                <select id="filterModel" onchange="filterOrders()">
                    <option value="">全部型号</option>
                </select>
                <input type="text" id="filterCustomer" placeholder="客户筛选..." oninput="filterOrders()">
                <select id="sortSelect" onchange="sortOrders()">
                    <option value="">默认排序</option>
                    <option value="model">按型号排序</option>
                    <option value="queueDate">按排队日期排序</option>
                    <option value="tonnage">按吨位排序</option>
                </select>
            </div>
            
            <div id="ordersList" class="orders-list">
                <div class="loading">加载中...</div>
            </div>
            <div id="pagination" class="pagination-container"></div>
        </div>

        <div id="feedbackTab" class="tab-content">
            <div class="feedback-card">
                <div class="feedback-icon"><svg class="feedback-phone-icon" viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></div>
                <h2>遇到问题？</h2>
                <p class="feedback-desc">如果您在使用系统过程中遇到任何问题，请联系技术支持</p>
                <div class="feedback-info">
                    <div class="feedback-item">
                        <span class="feedback-label">联系人</span>
                        <span class="feedback-value">李刚</span>
                    </div>
                    <div class="feedback-item">
                        <span class="feedback-label">电话</span>
                        <a href="tel:18553303897" class="feedback-value feedback-phone">18553303897</a>
                    </div>
                </div>
                <p class="feedback-tip">工作时间：周一至周五 8:30-17:30</p>
            </div>
        </div>

        <div id="adminTab" class="tab-content">
            <div class="admin-card">
                <h2 class="admin-title">管理员凭证管理</h2>
                <p class="admin-desc">仅李刚可见。主服务管理腾讯、Render、GitHub 三项凭证，保存到 Render 环境变量；输入框不回显，日志只显示前 4 位 + 后 4 位，保存后会触发重新部署。</p>
                <div id="adminItems" class="admin-items"></div>
                <div id="adminLog" class="admin-log"></div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>修改排队</h2>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editForm" class="order-form">
                <input type="hidden" id="editRowIndex">
                <div class="form-row">
                    <div class="form-group form-col">
                        <label for="editModel">型号</label>
                        <select id="editModel" name="editModel" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group form-col">
                        <label for="editTonnage">吨位</label>
                        <input type="number" id="editTonnage" name="editTonnage" step="0.01" required placeholder="吨位">
                    </div>
                    <div class="form-group form-col">
                        <label for="editCustomer">客户</label>
                        <input type="text" id="editCustomer" name="editCustomer" required placeholder="客户">
                    </div>
                </div>

                <div class="form-group">
                    <label for="editExpectedDate">期望发货日期</label>
                    <input type="text" id="editExpectedDate" name="editExpectedDate" required readonly placeholder="点击选择日期" onclick="showDatePicker(this)" style="cursor:pointer;background:#fff;">
                </div>

                <div class="form-group">
                    <label for="editCalculatedDate">可发货日期</label>
                    <input type="text" id="editCalculatedDate" name="editCalculatedDate" readonly placeholder="修改上方信息后自动计算">
                </div>

                <div class="form-group">
                    <label for="editQueueDate">输入发货日期排队</label>
                    <input type="text" id="editQueueDate" name="editQueueDate" required readonly placeholder="点击选择日期" onclick="showDatePicker(this)" style="cursor:pointer;background:#fff;">
                    <div class="date-hint" id="editDateHint"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">保存修改</button>
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="changePwdModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>修改密码</h2>
                <span class="close" onclick="closeChangePwdModal()">&times;</span>
            </div>
            <form id="changePwdForm" class="order-form">
                <div class="form-group">
                    <label for="oldPassword">旧密码</label>
                    <input type="password" id="oldPassword" name="oldPassword" required placeholder="请输入旧密码">
                </div>
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" name="newPassword" required placeholder="请输入新密码">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入新密码">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">确认修改</button>
                    <button type="button" class="btn-cancel" onclick="closeChangePwdModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/app.js?v=34"></script>
</body>
</html>
